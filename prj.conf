# Base configuration: improv over serial (default, tested with the JS Web Serial
# installer at https://www.improv-wifi.com/serial/). Enable BLE additionally with
# -DEXTRA_CONF_FILE=overlay-ble.conf.

# Improv transport
CONFIG_IMPROV_SERIAL=y

# Wi-Fi + networking
CONFIG_WIFI=y
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_DHCPV4=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_L2_WIFI_MGMT=y

# Wi-Fi credentials library (persist + connect-stored on boot)
CONFIG_WIFI_NM=y
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=y
CONFIG_WIFI_CREDENTIALS_CONNECT_STORED=y

# Persistence backend (NVS via the settings subsystem on storage_partition)
CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y

# Serial console (improv frames + logs share this UART; the IMPROV header lets the
# installer pick frames out of the log text). Shell is intentionally left off so it
# does not consume RX.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Optional identify LED
CONFIG_GPIO=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
