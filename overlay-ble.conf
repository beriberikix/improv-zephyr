# Overlay that adds the improv BLE (GATT) transport, compatible with the Web
# Bluetooth installer at https://www.improv-wifi.com/ble/.
#
# Use alongside the base prj.conf, e.g.:
#   west build -b esp32s3_devkitc/esp32s3/procpu . -- -DEXTRA_CONF_FILE=overlay-ble.conf
#
# This keeps the serial transport enabled as well (simultaneous mode). To build a
# BLE-only image, also set CONFIG_IMPROV_SERIAL=n.

CONFIG_IMPROV_BLE=y

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Zephyr Improv"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_SETTINGS=y

# Raise the ATT MTU so a 64-byte PSK arrives in a single RPC-command write.
CONFIG_BT_L2CAP_TX_MTU=128
CONFIG_BT_BUF_ACL_RX_SIZE=132
CONFIG_BT_BUF_ACL_TX_SIZE=132
