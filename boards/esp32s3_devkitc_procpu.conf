# Board-specific tuning for esp32s3_devkitc. The ESP32 Wi-Fi driver auto-enables
# (CONFIG_WIFI_ESP32) and adds its own heap (HEAP_MEM_POOL_ADD_SIZE_ESP_WIFI), so
# most defaults are fine. Headroom is added here for the networking stacks.

CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
